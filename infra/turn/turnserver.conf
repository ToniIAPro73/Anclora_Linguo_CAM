listening-port=3478
tls-listening-port=5349

listening-ip=0.0.0.0
relay-ip=0.0.0.0
external-ip=<PUBLIC_IP>

realm=linguocam.example.com
server-name=linguocam-turn

fingerprint
lt-cred-mech
user=linguocam:CHANGE_ME_PASSWORD

no-stdout-log
log-file=/var/log/turnserver/turn.log

no-multicast-peers
no-cli

cert=/etc/letsencrypt/live/linguocam.example.com/fullchain.pem
pkey=/etc/letsencrypt/live/linguocam.example.com/privkey.pem
