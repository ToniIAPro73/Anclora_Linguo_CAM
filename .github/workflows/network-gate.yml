name: Network Gate (E2E)

on:
  workflow_dispatch:
  schedule:
    - cron: '0 4 * * 1'

jobs:
  e2e-network:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: services/asr-mt/requirements.txt

      - name: Install frontend deps
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Run constrained-network E2E
        run: npm run test:e2e:network

      - name: Upload Playwright artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-network-gate
          path: |
            playwright-report
            test-results
          if-no-files-found: ignore
